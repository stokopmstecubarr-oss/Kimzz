<!-- Bagian Upload Bukti Transfer di card -->
<div class="card">
<h2>Upload Bukti Transfer</h2>
<input type="text" id="namaUserInput" placeholder="Nama Kamu..." required>
<select id="produkSelect">
<option value="">-- Pilih Produk --</option>
<option value="UBOT TELEGRAM 1 BULAN - 3K">UBOT TELEGRAM 1 BULAN HARGA:3K</option>
<option value="UBOT TELEGRAM PERMANEN - 5K">UBOT TELEGRAM PERMANEN HARGA:5K</option>
<option value="PANEL UNLI - 4K">PANEL UNLI HARGA:4K</option>
</select>
<input type="file" id="buktiInput" accept="image/*">
<textarea id="catatanInput" placeholder="Catatan untuk owner..." rows="3"></textarea>
<button onclick="kirimBukti()">Kirim ke Telegram</button>
<div style="margin-top:10px; text-align:center;">
<button onclick="togglePayment()">Pilih Payment Lain</button>
<div id="paymentOther" style="display:none; margin-top:10px;">
<button onclick="orderDana()">DANA: 085647899626</button>
</div>
</div>
<div id="afterUpload" style="display:none; margin-top:10px; text-align:center;">
<a href="https://t.me/Kimzz080" target="_blank">Chat Telegram Admin</a>
</div>
</div>

<script>
// Toggle Payment Lain
function togglePayment(){
document.getElementById('paymentOther').style.display =
  document.getElementById('paymentOther').style.display === 'none' ? 'block' : 'none';
}

function orderDana(){
const namaProduk=document.getElementById('produkSelect').value || "Tidak diketahui";
const namaUser=document.getElementById('namaUserInput').value || "Anon";
const nomor="085647899626";
const pesan=encodeURIComponent(`Halo Admin, saya ${namaUser} mau order ${namaProduk} via DANA`);
window.open("https://wa.me/"+nomor+"?text="+pesan,"_blank");
}

// kirimBukti() sudah include nama user dan produk
async function kirimBukti(){
const fileInput=document.getElementById('buktiInput');
if(!fileInput.files.length){alert('Pilih file dulu tolol'); return;}
const file=fileInput.files[0];
const catatan=document.getElementById('catatanInput').value || "";
const produk=document.getElementById('produkSelect').value || "Tidak diketahui";
const namaUser=document.getElementById('namaUserInput').value || "Anon";

const formData=new FormData();
formData.append('chat_id','7797110418');
formData.append('document',file);
formData.append('caption',`Owner, ada yang mentransfer lewat QRIS/DANA untuk membeli produk: "${produk}". Nama: ${namaUser}. Catatan: ${catatan}`);

const token='8224631167:AAE8JN4jcnCSlH1Ku29wYKFP-zbWO27eimY';
const url=`https://api.telegram.org/bot${token}/sendDocument`;

try{
await fetch(url,{method:'POST',body:formData});
showNotif();
document.getElementById('afterUpload').style.display='block';
}catch(e){console.error(e);}
}
</script>
